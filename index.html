<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HPTT // THE_ORIGINAL_SPARK_V12_FINAL</title>
    <style>
        :root {
            --bg: #020408;
            --cyan: #22d3ee;
            --panel: rgba(5, 10, 20, 0.95);
            --border: #1e293b;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden; touch-action: none;
        }

        canvas { display: block; position: absolute; inset: 0; }

        #hud {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: var(--panel); border: 1px solid var(--border);
            padding: 10px; border-radius: 2px; pointer-events: none;
        }
        .stat { font-size: 10px; margin-bottom: 2px; letter-spacing: 1px; }
        .val { color: var(--cyan); font-weight: bold; }

        #interface {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: var(--panel); border-top: 1px solid var(--cyan);
            z-index: 200; transform: translateY(calc(100% - 35px));
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        #interface.open { transform: translateY(0); }
        
        #handle {
            height: 35px; background: #000; display: flex; align-items: center;
            justify-content: center; cursor: pointer; border-bottom: 1px solid var(--border);
        }
        #handle span { font-size: 11px; color: var(--cyan); letter-spacing: 2px; }

        #scroll-content { flex: 1; overflow-y: auto; padding: 15px; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 6px 2px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 11px; }
        input[type="text"] {
            background: #000; border: 1px solid var(--border); color: var(--cyan);
            padding: 4px; width: 80px; text-align: right; font-family: inherit;
        }
        input[type="color"] {
            background: #000; border: 1px solid var(--border); 
            padding: 0; width: 80px; height: 22px; cursor: pointer;
        }
        
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        button {
            flex: 1; background: #111827; border: 1px solid var(--border);
            color: #fff; padding: 10px; font-size: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="hud">
        <div class="stat">SIGNAL: <span class="val">COHERENT</span></div>
        <div class="stat">ENTITY_COUNT: <span class="val" id="ui-e">6</span></div>
    </div>

    <div id="interface">
        <div id="handle" onclick="document.getElementById('interface').classList.toggle('open')">
            <span>TERMINAL_CONTROLS_V12_FINAL</span>
        </div>
        <div id="scroll-content">
            <div class="btn-row">
                <button onclick="clearLattice()">PURGE_CANVAS</button>
            </div>
            <table id="param-table"></table>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        const state = {
            t: 0,
            pos: { x: window.innerWidth/2, y: window.innerHeight/2, active: false },
            lastPoints: [],
            config: {
                "ENTITIES": 6.0,
                "FREQ_X": 2.0,
                "FREQ_Y": 3.0,
                "AMP": 180.0,
                "PHASE": 0.05,
                "DECAY": 0.0,
                "WIDTH": 0.6,
                "OPACITY": 0.4,
                "LINE_COLOR": "#22d3ee",
                "BG_COLOR": "#020408"
            }
        };

        function buildTable() {
            const table = document.getElementById('param-table');
            table.innerHTML = '';
            Object.keys(state.config).forEach(key => {
                const tr = document.createElement('tr');
                let inputElement;
                
                if (key === 'LINE_COLOR' || key === 'BG_COLOR') {
                    inputElement = `<input type="color" value="${state.config[key]}" onchange="updateColor('${key}', this.value)">`;
                } else {
                    inputElement = `<input type="text" value="${state.config[key]}" onchange="updateNum('${key}', this.value)">`;
                }

                tr.innerHTML = `<td>${key}</td><td style="text-align:right">${inputElement}</td>`;
                table.appendChild(tr);
            });
        }

        function updateNum(key, val) {
            state.config[key] = parseFloat(val);
            if(key === 'ENTITIES') initEntities();
        }

        function updateColor(key, val) {
            state.config[key] = val;
            if(key === 'BG_COLOR') {
                document.body.style.backgroundColor = val;
                clearLattice(); // Instantly show new background
            }
        }

        function clearLattice() {
            ctx.fillStyle = state.config.BG_COLOR;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function initEntities() {
            state.lastPoints = [];
            for(let i=0; i<state.config.ENTITIES; i++) state.lastPoints.push(null);
            document.getElementById('ui-e').innerText = state.config.ENTITIES;
        }

        const getPos = (e) => {
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        };

        window.addEventListener('touchstart', (e) => {
            if(e.target.closest('#interface')) return;
            state.pos.active = true;
            const p = getPos(e); state.pos.x = p.x; state.pos.y = p.y;
            state.lastPoints = state.lastPoints.map(() => null);
        }, {passive:false});
        
        window.addEventListener('touchmove', (e) => {
            if(!state.pos.active) return;
            e.preventDefault();
            const p = getPos(e); state.pos.x = p.x; state.pos.y = p.y;
        }, {passive:false});
        
        window.addEventListener('touchend', () => state.pos.active = false);
        window.addEventListener('mousedown', (e) => {
            if(e.target.closest('#interface')) return;
            state.pos.active = true; state.pos.x = e.clientX; state.pos.y = e.clientY;
            state.lastPoints = state.lastPoints.map(() => null);
        });
        window.addEventListener('mousemove', (e) => {
            if(state.pos.active) { state.pos.x = e.clientX; state.pos.y = e.clientY; }
        });
        window.addEventListener('mouseup', () => state.pos.active = false);

        function draw() {
            state.t += 0.02;

            if(state.config.DECAY > 0) {
                // Convert Hex to RGB for the fade trail
                const hex = state.config.BG_COLOR;
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${state.config.DECAY})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            for(let i = 0; i < state.config.ENTITIES; i++) {
                const shift = i * state.config.PHASE;
                
                const x = state.pos.x + Math.sin(state.t * state.config.FREQ_X + shift) * state.config.AMP;
                const y = state.pos.y + Math.cos(state.t * state.config.FREQ_Y + shift) * state.config.AMP;

                if(state.lastPoints[i]) {
                    ctx.beginPath();
                    ctx.strokeStyle = state.config.LINE_COLOR;
                    ctx.globalAlpha = state.config.OPACITY;
                    ctx.lineWidth = state.config.WIDTH;
                    ctx.moveTo(state.lastPoints[i].x, state.lastPoints[i].y);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                }
                state.lastPoints[i] = { x, y };
            }
            ctx.globalAlpha = 1.0; 
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            clearLattice();
        });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        buildTable();
        initEntities();
        clearLattice();
        draw();
    </script>
</body>
</html>
